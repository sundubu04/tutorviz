name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Validates secrets against real APIs before SSH (OpenAI + Supabase are reachable from Actions).
  # Database URLs are checked on the VPS (see deploy job) so Supabase IP allowlists that exclude
  # GitHub do not block deploys.
  verify-api-health:
    runs-on: ubuntu-latest
    steps:
      - name: Verify OpenAI API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${OPENAI_MODEL:-}" ]; then
            echo "ERROR: OPENAI_API_KEY and OPENAI_MODEL must be set in repository secrets."
            exit 1
          fi
          code="$(curl -sS -o /tmp/openai_models.json -w "%{http_code}" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            "https://api.openai.com/v1/models")"
          if [ "$code" != "200" ]; then
            echo "ERROR: OpenAI API key check failed (HTTP ${code}). Ensure the key is valid and billing is active."
            exit 1
          fi
          if ! jq -e --arg m "$OPENAI_MODEL" '.data[] | select(.id == $m)' /tmp/openai_models.json >/dev/null; then
            echo "ERROR: OPENAI_MODEL=\"${OPENAI_MODEL}\" was not found in the account's available models."
            exit 1
          fi
          echo "OpenAI API key and model OK."

      - name: Verify Supabase URL and keys
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ] || [ -z "${SUPABASE_SECRET_KEY:-}" ]; then
            echo "ERROR: SUPABASE_URL, SUPABASE_ANON_KEY, and SUPABASE_SECRET_KEY must be set in repository secrets."
            exit 1
          fi
          # Strip CR/LF, trim, and remove accidental wrapping quotes from secrets (common paste issues in GitHub).
          trim_secrets() {
            # shellcheck disable=SC2001
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"\(.*\)"$/\1/' -e "s/^'\(.*\)'$/\1/"
          }
          SB_URL="$(trim_secrets "$SUPABASE_URL" | sed -e 's|/*$||')"
          ANON="$(trim_secrets "$SUPABASE_ANON_KEY")"
          SECRET="$(trim_secrets "$SUPABASE_SECRET_KEY")"
          if [ -z "$ANON" ] || [ -z "$SECRET" ]; then
            echo "ERROR: SUPABASE_ANON_KEY or SUPABASE_SECRET_KEY is empty after trimming."
            exit 1
          fi
          case "$SB_URL" in
            http://*|https://*) ;;
            *) echo "ERROR: SUPABASE_URL must start with http:// or https:// (got host only or wrong value)."; exit 1 ;;
          esac
          code="$(curl -g -sSL -o /dev/null -w "%{http_code}" \
            -H "apikey: ${ANON}" \
            -H "Authorization: Bearer ${ANON}" \
            "${SB_URL}/auth/v1/health")"
          if [ "$code" != "200" ]; then
            echo "ERROR: Supabase Auth health check failed (HTTP ${code}). Check SUPABASE_URL, SUPABASE_ANON_KEY, and project ref/region."
            exit 1
          fi
          # PostgREST OpenAPI root (/rest/v1/) allows schema access with service role only on hosted Supabase; anon returns 401 there.
          code="$(curl -g -sSL -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SECRET}" \
            -H "Authorization: Bearer ${SECRET}" \
            "${SB_URL}/rest/v1/")"
          if [ "$code" != "200" ]; then
            echo "ERROR: Supabase service role key rejected by PostgREST (HTTP ${code})."
            echo "Use the service_role JWT or sb_secret key from the same project as SUPABASE_URL (Project Settings → API)."
            echo "If you rotated keys, copy fresh values from the dashboard."
            exit 1
          fi
          echo "Supabase URL and keys OK."

  deploy:
    needs: verify-api-health
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Optional: set in GitHub Actions secrets to automate first-time + renewals (see docs/DEPLOY.md).
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 30m
          envs: OPENAI_API_KEY,OPENAI_MODEL,DATABASE_URL,DIRECT_URL,CORS_ORIGIN,SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SECRET_KEY,CERTBOT_EMAIL
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ -z "${OPENAI_API_KEY:-}" ] || [ -z "${OPENAI_MODEL:-}" ] || \
               [ -z "${DATABASE_URL:-}" ] || [ -z "${DIRECT_URL:-}" ] || \
               [ -z "${CORS_ORIGIN:-}" ] || [ -z "${SUPABASE_URL:-}" ] || \
               [ -z "${SUPABASE_ANON_KEY:-}" ] || [ -z "${SUPABASE_SECRET_KEY:-}" ]; then
              echo "ERROR: One or more required GitHub Actions secrets are empty (see deploy workflow env list)."
              exit 1
            fi
            umask 077
            {
              printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
              printf 'OPENAI_MODEL=%s\n' "$OPENAI_MODEL"
              printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
              printf 'DIRECT_URL=%s\n' "$DIRECT_URL"
              printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN"
              printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
              printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
              printf 'SUPABASE_SECRET_KEY=%s\n' "$SUPABASE_SECRET_KEY"
              # Same-origin API for the built SPA (matches docker-compose.prod.yml frontend build arg).
              printf '%s\n' 'REACT_APP_API_BASE=/api'
            } > .env
            chmod 600 .env
            echo "Verifying PostgreSQL connectivity from this server (DATABASE_URL and DIRECT_URL) ..."
            PSQL_IMG="postgres:16-alpine"
            docker run --rm "$PSQL_IMG" psql "$DATABASE_URL" -c 'SELECT 1' -v ON_ERROR_STOP=1 >/dev/null
            docker run --rm "$PSQL_IMG" psql "$DIRECT_URL" -c 'SELECT 1' -v ON_ERROR_STOP=1 >/dev/null
            echo "PostgreSQL URLs are reachable from the deploy host."
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml run --rm --no-deps backend npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d
            # Load new bind-mounted edge configs without requiring container restart.
            docker compose -f docker-compose.prod.yml exec -T nginx-edge nginx -s reload 2>/dev/null || true
            # TLS (optional): set CERTBOT_EMAIL in Actions secrets. Domains must match deploy/nginx-edge
            # (tutorviz.org + www) and ssl_certificate paths in 01-https.conf.example.
            if [ -n "${CERTBOT_EMAIL:-}" ]; then
              COMPOSE="docker compose -f docker-compose.prod.yml"
              CERT_LIST=$($COMPOSE --profile tls run --rm certbot certificates 2>&1) || true
              if ! echo "$CERT_LIST" | grep -q 'tutorviz.org'; then
                echo "Requesting new Let's Encrypt certificate (HTTP-01 via webroot) ..."
                $COMPOSE --profile tls run --rm certbot certonly \
                  --webroot -w /var/www/certbot \
                  --non-interactive \
                  --email "$CERTBOT_EMAIL" \
                  --agree-tos \
                  --no-eff-email \
                  -d tutorviz.org \
                  -d www.tutorviz.org
              fi
              echo "Renewing certificates if due ..."
              $COMPOSE --profile tls run --rm certbot renew --webroot -w /var/www/certbot || true
              if echo "$($COMPOSE --profile tls run --rm certbot certificates 2>&1)" | grep -q 'tutorviz.org'; then
                if [ ! -f deploy/nginx-edge/01-https.conf ]; then
                  echo "Installing HTTPS server block from 01-https.conf.example ..."
                  cp deploy/nginx-edge/01-https.conf.example deploy/nginx-edge/01-https.conf
                fi
              fi
              $COMPOSE exec -T nginx-edge nginx -t && $COMPOSE exec -T nginx-edge nginx -s reload
            fi

