<!-- Whiteboards View -->
<div id="whiteboards" class="content-section">
    <div class="whiteboards-container">
        <div class="whiteboards-header">
            <h2>My Whiteboards</h2>
            <button class="btn-primary create-whiteboard-btn">
                <i class="fas fa-plus"></i>
                Create New Whiteboard
            </button>
        </div>
        
        <div class="whiteboards-grid">
            <!-- Whiteboard cards will be dynamically loaded from API -->
            <div class="whiteboard-card new-board" id="create-new-board">
                <div class="new-board-content">
                    <i class="fas fa-plus-circle"></i>
                    <h3>Create New Whiteboard</h3>
                    <p>Start collaborating with your team</p>
                </div>
            </div>
        </div>
    </div>
</div>
