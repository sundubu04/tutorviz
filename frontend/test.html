<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-btn { background: #007bff; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; }
        .status { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Whiteboard Functionality Test</h1>
    <div id="status"></div>
    <button class="test-btn" onclick="testWhiteboard()">Test Whiteboard Function</button>
    <div id="result"></div>

    <script>
        function showStatus(msg, type) {
            document.getElementById('status').innerHTML = `<div class="status ${type}">${msg}</div>`;
        }

        async function testWhiteboard() {
            try {
                showStatus('Testing whiteboard functionality...', 'success');
                
                // Test 1: Check if WhiteboardManager class exists
                if (typeof WhiteboardManager === 'undefined') {
                    showStatus('❌ WhiteboardManager class not found!', 'error');
                    return;
                }
                showStatus('✅ WhiteboardManager class found', 'success');
                
                // Test 2: Check if openWhiteboard function exists
                if (typeof openWhiteboard === 'undefined') {
                    showStatus('❌ openWhiteboard function not found!', 'error');
                    return;
                }
                showStatus('✅ openWhiteboard function found', 'success');
                
                // Test 3: Test API connection
                const response = await fetch('http://localhost:3001/api/whiteboards?userId=1');
                const data = await response.json();
                
                if (data.success) {
                    showStatus(`✅ API working! Found ${data.data.length} whiteboards`, 'success');
                    
                    // Test 4: Try to open the first whiteboard
                    if (data.data.length > 0) {
                        const firstWhiteboard = data.data[0];
                        showStatus(`Testing with whiteboard: ${firstWhiteboard.title} (ID: ${firstWhiteboard.id})`, 'success');
                        
                        // Call the openWhiteboard function
                        openWhiteboard(firstWhiteboard.id);
                        
                        showStatus('✅ openWhiteboard function called successfully!', 'success');
                    }
                } else {
                    showStatus('❌ API returned error: ' + data.error, 'error');
                }
                
            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }

        // Load the required scripts
        function loadScripts() {
            const scripts = [
                'features/whiteboard/whiteboard.js',
                'features/whiteboard/whiteboard-list.js'
            ];
            
            scripts.forEach(src => {
                const script = document.createElement('script');
                script.src = src;
                document.head.appendChild(script);
            });
        }

        // Load scripts when page loads
        window.addEventListener('load', loadScripts);
    </script>
</body>
</html>
