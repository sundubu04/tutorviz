services:
  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tutorviz-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5001
     
      # Database connection
      # When running inside Docker, `127.0.0.1` points to the container itself.
      # Use `host.docker.internal` to reach Supabase running on the host.
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      DIRECT_URL: postgresql://postgres:postgres@host.docker.internal:54322/postgres
      
      # Supabase Auth
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}

      CORS_ORIGIN: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      # File watching optimizations
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      # Exclude node_modules from volume to prevent conflicts
      - /app/backend/node_modules
    command: sh -c "npm run db:setup && npm run dev"
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true

  # Frontend React App (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tutorviz-frontend-dev
    environment:
      # File watching optimizations for React
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      - REACT_APP_API_URL=http://localhost:5001
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/frontend/node_modules
      # Exclude backend from frontend volume to prevent conflicts
      - /app/backend
    depends_on:
      - backend
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true

networks:
  default:
    name: tutorviz-dev-network