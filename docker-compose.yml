version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: tutoriai-postgres
    environment:
      POSTGRES_DB: tutoriai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tutoriai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: 