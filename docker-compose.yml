services:
  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tutorviz-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5001
      # Override via repo-root `.env` (e.g. hosted Supabase). Defaults match local `supabase start`.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres}
      SUPABASE_URL: ${SUPABASE_URL:-http://host.docker.internal:54321}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # File watching optimizations
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    ports:
      - "${BACKEND_PUBLISH_PORT:-5001}:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      # Exclude node_modules from volume to prevent conflicts
      - /app/backend/node_modules
    command: sh -c "npm run db:setup && npm run dev"
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true

  # Frontend React App (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tutorviz-frontend-dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      FAST_REFRESH: "true"
      REACT_APP_API_BASE: ${REACT_APP_API_BASE:-http://localhost:5001/api}
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/frontend/node_modules
      # Exclude backend from frontend volume to prevent conflicts
      - /app/backend
    depends_on:
      - backend
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true

networks:
  default:
    name: tutorviz-dev-network