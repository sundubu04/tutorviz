# Production stack: edge nginx (TLS + ACME) → SPA nginx (static + /api proxy) → Express API.
# Create a .env next to this file on the server (never commit). Compose loads it for `env_file`
# and for variable substitution below. See docs/DEPLOY.md

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "5001"
    expose:
      - "5001"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - tutorviz-prod

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ${REACT_APP_API_BASE:-/api}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - tutorviz-prod

  # Public entry: ports 80/443 only here. TLS certs in certbot-conf; challenges in certbot-www.
  nginx-edge:
    image: nginx:alpine
    container_name: tutorviz-nginx-edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-edge:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
    networks:
      - tutorviz-prod

  # Not started by default. Issue / renew certs, e.g.:
  #   docker compose -f docker-compose.prod.yml --profile tls run --rm certbot certonly ...
  certbot:
    image: certbot/certbot:latest
    profiles:
      - tls
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  backend_uploads:
  certbot-www:
  certbot-conf:

networks:
  tutorviz-prod:
    name: tutorviz-prod-network
