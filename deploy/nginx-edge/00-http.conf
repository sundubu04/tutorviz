# Edge nginx: public HTTP (80). Proxies to the SPA container, which also proxies /api → backend.
# ACME HTTP-01: Certbot writes to /var/www/certbot; this path must stay on port 80.
#
# Runtime DNS via Docker's embedded resolver so nginx does not fail at startup when `frontend`
# is not yet registered (avoids "host not found in upstream frontend").
#
# After TLS is live (01-https.conf + certificates), replace the `location /` block with an
# HTTP→HTTPS redirect — see docs/DEPLOY.md — so browsers and APIs use HTTPS only.

server {
    listen 80;
    listen [::]:80;
    server_name tutorviz.org www.tutorviz.org;

    # Docker embedded DNS — resolve `frontend` on each request / cache briefly.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        set $frontend_upstream http://frontend:80;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow long /api requests (e.g. AI) proxied through frontend nginx (default is 60s).
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}
