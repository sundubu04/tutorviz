version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: tutoriai-postgres-dev
    environment:
      POSTGRES_DB: tutoriai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tutoriai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tutoriai-backend-dev
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=tutoriai_db
      - DB_USER=postgres
      - DB_PASSWORD=your_password
      - JWT_SECRET=your_jwt_secret_key_here
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGIN=http://localhost:3000
      - UPLOAD_PATH=./uploads
      - MAX_FILE_SIZE=10485760
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: npm run dev

volumes:
  postgres_data_dev:

