version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: tutoriai-postgres-dev
    environment:
      POSTGRES_DB: tutoriai_dev
      POSTGRES_USER: tutoriai_user
      POSTGRES_PASSWORD: tutoriai_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backend/docker/postgres/init-security.sql:/docker-entrypoint-initdb.d/init-security.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutoriai_user -d tutoriai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tutoriai-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5001
      DATABASE_URL: postgresql://tutoriai_user:tutoriai_password@postgres:5432/tutoriai_dev
      JWT_SECRET: dev-jwt-secret-key
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    command: npm run dev
    restart: unless-stopped

  # Frontend React App (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tutoriai-frontend-dev
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://localhost:5001
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local

networks:
  default:
    name: tutoriai-dev-network

