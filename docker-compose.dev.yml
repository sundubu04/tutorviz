services:
  # Backend API (Development)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tutorviz-backend-dev
    environment:
      NODE_ENV: development
      PORT: 5001
      # Override via repo-root `.env` (e.g. hosted Supabase).
      # Defaults target the local `supabase start` containers directly (more reliable than host.docker.internal).
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@supabase_db_tutorviz:5432/postgres}
      DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@supabase_db_tutorviz:5432/postgres}
      SUPABASE_URL: ${SUPABASE_URL:-http://supabase_kong_tutorviz:8000}
      # Browser must use host-exposed kong, not Docker DNS.
      SUPABASE_BROWSER_URL: ${SUPABASE_BROWSER_URL:-http://localhost:54321}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LANGGRAPH_SERVICE_URL: ${LANGGRAPH_SERVICE_URL:-http://langgraph-service:8000}
      # File watching optimizations
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    ports:
      - "${BACKEND_PUBLISH_PORT:-5001}:5001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
      # Exclude node_modules from volume to prevent conflicts
      - /app/backend/node_modules
    # In dev, Prisma may prompt when changes cause data loss; accept to avoid startup hangs.
    command: sh -c "npm run prisma:generate && npx prisma db push --accept-data-loss && npm run db:seed && npm run dev"
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true
    networks:
      - default
      - supabase

  # LangGraph workflow service (Development)
  langgraph-service:
    build:
      context: ./services/langgraph
      dockerfile: Dockerfile
    container_name: tutorviz-langgraph-dev
    environment:
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_WEB_SEARCH_MODEL: ${OPENAI_WEB_SEARCH_MODEL:-gpt-4o-mini}
      OPENAI_WEB_SEARCH_LIVE: ${OPENAI_WEB_SEARCH_LIVE:-true}
    ports:
      - "${LANGGRAPH_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./services/langgraph:/app
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Frontend React App (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tutorviz-frontend-dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      FAST_REFRESH: "true"
      # Browser calls host-mapped API; override if BACKEND_PUBLISH_PORT or host differs
      REACT_APP_API_BASE: ${REACT_APP_API_BASE:-http://localhost:5001/api}
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/frontend/node_modules
      # Exclude backend from frontend volume to prevent conflicts
      - /app/backend
    depends_on:
      - backend
      - langgraph-service
    restart: unless-stopped
    # Enable file watching with polling for better cross-platform support
    stdin_open: true
    tty: true

networks:
  default:
    name: tutorviz-dev-network
  supabase:
    external: true
    name: supabase_network_tutorviz

